<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant Chatbot</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 400px;
            height: 550px;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            padding: 8px 12px;
            border-radius: 15px;
            margin-bottom: 10px;
            max-width: 75%;
        }

        .user-message {
            background-color: #0d6efd;
            color: white;
            margin-left: auto;
        }

        .bot-message {
            background-color: #e9ecef;
        }

        .chat-header {
            border-bottom: 1px solid #ddd;
        }

        .chat-input {
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="chat-container shadow-lg">

    <!-- Header -->
    <div class="chat-header p-3 text-center bg-primary text-white rounded-top">
        <h5 class="mb-0">PikuAI💖</h5>
    </div>

    <!-- Chat Messages -->
    <div id="chatBox" class="chat-box"></div>

    <!-- Input Area -->
    <div class="chat-input p-3">
        <div class="input-group">
            <input type="text" id="userInput" class="form-control" placeholder="Type your message...">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function getBotReply(message) {
        let msg = message.toLowerCase().trim();

        if (["hi", "hello", "hey"].includes(msg)) {
            return "Hello 👋 How can I help you today?";
        } 
        else if (msg.includes("how are you")) {
            return "I'm doing great 😊";
        } 
        else if (msg === "bye") {
            return "Goodbye 👋";
        } 
        else {
            return "I didn't understand that.";
        }
    }

    function appendMessage(text, className) {
        let chatBox = document.getElementById("chatBox");

        if (!chatBox) return;

        let messageDiv = document.createElement("div");
        messageDiv.className = "message " + className;
        messageDiv.innerText = text;

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.sendMessage = function () {
        try {
            let inputField = document.getElementById("userInput");

            if (!inputField) return;

            let message = inputField.value.trim();
            if (message === "") return;

            appendMessage(message, "user-message");

            let botReply = getBotReply(message);

            setTimeout(() => {
                appendMessage(botReply, "bot-message");
            }, 400);

            inputField.value = "";

        } catch (error) {
            console.error(error);
            appendMessage("Something went wrong!", "bot-message");
        }
    };

    document.getElementById("userInput")
        .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

});
</script>

</body>
</html>
